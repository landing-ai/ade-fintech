<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Admin Panel - LandingAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; border-bottom: 2px solid rgba(74, 159, 232, 0.3); margin-bottom: 40px; }
        h1 { font-size: 2.5rem; color: #4a9fe8; margin-bottom: 10px; }
        .subtitle { color: #a0a0a0; font-size: 1.1rem; }
        
        /* Login Screen */
        .login-screen { max-width: 400px; margin: 100px auto; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(74, 159, 232, 0.3); border-radius: 12px; padding: 40px; }
        .login-screen h2 { color: #4a9fe8; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #d0d0d0; font-weight: 500; }
        input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(74, 159, 232, 0.5); border-radius: 6px; color: #ffffff; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #4a9fe8; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: #3a8fd8; }
        .error { color: #e74c3c; margin-bottom: 15px; text-align: center; display: none; }

        /* Admin Panel */
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }

        /* Toolbar */
        .toolbar { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; }
        .btn-primary { background: #4a9fe8; padding: 10px 20px; width: auto; }
        .btn-secondary { background: #95a5a6; padding: 10px 20px; width: auto; }
        .btn-danger { background: #e74c3c; padding: 10px 20px; width: auto; }
        .search-box { flex: 1; }

        /* Table */
        .table-container { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(74, 159, 232, 0.2); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; background: rgba(74, 159, 232, 0.2); color: #4a9fe8; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .cert-id { font-family: monospace; color: #4a9fe8; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; border: 1px solid rgba(74, 159, 232, 0.3); border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 2rem; color: #a0a0a0; padding: 0; width: auto; }

        /* Projects Section */
        .projects-info { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); padding: 20px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .projects-info a { color: #2ecc71; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <h2>🔐 Admin Login</h2>
            <div id="loginError" class="error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <header>
                <h1>📋 Certificate Admin Panel</h1>
                <p class="subtitle">Managed by Secure Backend API</p>
            </header>

            <div class="projects-info">
                <div>
                    <strong>📁 Projects Management:</strong><br>
                    Project data is managed via the GitHub repository to support decentralized updates.
                </div>
                <a href="https://github.com/landing-ai/ade-fintech/blob/master/data/projects_data.json" target="_blank">Edit Projects on GitHub →</a>
            </div>

            <div class="toolbar">
                <button class="btn-primary" id="addCertBtn">➕ Add Certificate</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search certificates...">
                </div>
                <button class="btn-secondary" id="refreshBtn">🔄 Refresh</button>
                <button class="btn-danger" id="logoutBtn">🚪 Logout</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody id="certsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Add Certificate Modal -->
        <div class="modal" id="certModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Certificate</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <form id="certForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="certName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="certEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="certRole" value="Participant">
                    </div>
                    <div class="form-group">
                        <label>ID (Auto-generated)</label>
                        <input type="text" id="certId" readonly style="opacity: 0.7;">
                    </div>
                    <button type="submit">Create</button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js?v=1"></script>
    <script>
        // Check Auth on Load
        const token = localStorage.getItem('authToken');
        if (token) {
            showAdminPanel();
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                await ApiService.login(email, password);
                showAdminPanel();
            } catch (err) {
                const errEl = document.getElementById('loginError');
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            ApiService.logout();
            location.reload();
        });

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            loadCertificates();
        }

        async function loadCertificates(search = '') {
            const tbody = document.getElementById('certsTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">Loading...</td></tr>';
            
            try {
                const res = await ApiService.getAllCertificates(1, 100, search);
                const certs = res.data;
                
                if (certs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">No certificates found.</td></tr>';
                    return;
                }

                tbody.innerHTML = certs.map(c => `
                    <tr>
                        <td class="cert-id">${c.id}</td>
                        <td>${c.recipient_name}</td>
                        <td>${c.email}</td>
                        <td>${c.role}</td>
                    </tr>
                `).join('');

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: red;">Error: ${err.message}</td></tr>`;
            }
        }

        // Search
        let debounceTimer;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                loadCertificates(e.target.value);
            }, 300);
        });

        document.getElementById('refreshBtn').addEventListener('click', () => loadCertificates());

        // ID Generation Logic (Client-side preview)
        function generateCertId(name, email) {
            const input = `${(name || '').trim().toLowerCase()}|${(email || '').trim().toLowerCase()}`;
            let hash = 0;
            for (let i = 0; i < input.length; i++) {
                hash = (hash << 5) - hash + input.charCodeAt(i);
                hash |= 0;
            }
            const hex = (hash >>> 0).toString(16).toUpperCase().padStart(8, '0');
            return `ADE-${hex.slice(0, 4)}-${hex.slice(4, 8)}`;
        }

        // Modal Logic
        const modal = document.getElementById('certModal');
        document.getElementById('addCertBtn').addEventListener('click', () => {
            document.getElementById('certForm').reset();
            document.getElementById('certId').value = '';
            modal.classList.add('active');
        });
        document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));

        // ID Preview
        const updateId = () => {
            const name = document.getElementById('certName').value;
            const email = document.getElementById('certEmail').value;
            if (name || email) document.getElementById('certId').value = generateCertId(name, email);
        };
        document.getElementById('certName').addEventListener('input', updateId);
        document.getElementById('certEmail').addEventListener('input', updateId);

        // Create Certificate
        document.getElementById('certForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                recipient_name: document.getElementById('certName').value,
                email: document.getElementById('certEmail').value,
                role: document.getElementById('certRole').value,
                id: document.getElementById('certId').value,
                issue_date: new Date().toISOString()
            };

            try {
                await ApiService.createCertificate(data);
                modal.classList.remove('active');
                loadCertificates();
                alert('Certificate created successfully!');
            } catch (err) {
                alert('Failed to create: ' + err.message);
            }
        });
    </script>
</body>
</html>
